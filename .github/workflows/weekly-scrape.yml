name: Weekly Web Novel Ranking Scrape

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: 크롤링 + 리포트 생성
        run: python main.py

      - name: 결과 커밋
        run: |
          git config user.name "webnovel-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A db/ reports/
          git commit -m "주간 랭킹 업데이트 $(date +'%Y-%m-%d')" || echo "변경 사항 없음"
          git push
